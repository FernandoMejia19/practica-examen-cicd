apiVersion: apps/v1
kind: Deployment

metadata:
  name: inventario-green

spec:
  replicas: 2

  selector:
    matchLabels:
      app: inventario-app
      color: green

  template:
    metadata:
      labels:
        app: inventario-app
        color: green

    spec:
      containers:
        - name: inventario-app

          image: ghcr.io/fernandomejia19/inventario-app:latest

          ports:
            - containerPort: 3000

          env:
            - name: APP_VERSION
              value: "v2"
          
            - name: APP_COLOR
              value: "green"
          
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: inventario-secret
                  key: API_KEY

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10